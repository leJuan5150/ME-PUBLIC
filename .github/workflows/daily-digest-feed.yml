name: Daily Digest Feed

on:
  schedule:
    # 11:00 UTC = 4:00 AM MST (Nov–Mar) / 5:00 AM MDT (Mar–Nov)
    # Cowork daily-digest runs at 5:30 AM local, so we always beat it.
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-digest-feed
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: daily-digest-feed/requirements.txt

      - name: Install dependencies
        run: pip install -r daily-digest-feed/requirements.txt

      - name: Fetch feeds
        run: python daily-digest-feed/fetch_feeds.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-digest-feed/feeds.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update feeds.json $(date -u +%Y-%m-%d)"
            # Retry-once on push conflict from a concurrent run
            git push || (git pull --rebase && git push)
          fi
